name: render & deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  BLENDER_VERSION: 4.5.11

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache Blender
        id: blender-cache
        uses: actions/cache@v4
        with:
          path: ~/blender
          key: blender-${{ env.BLENDER_VERSION }}-linux-x64

      - name: Install Blender
        if: steps.blender-cache.outputs.cache-hit != 'true'
        run: |
          curl -sL "https://download.blender.org/release/Blender4.5/blender-${BLENDER_VERSION}-linux-x64.tar.xz" | tar xJ -C "$HOME"
          mv "$HOME/blender-${BLENDER_VERSION}-linux-x64" "$HOME/blender"

      - name: Install runtime libs
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libxi6 libxxf86vm1 libxfixes3 libxrender1 libgl1 libxkbcommon0 libsm6 ffmpeg

      - name: Cache MPFB extension
        uses: actions/cache@v4
        with:
          path: ~/.config/blender/4.5/extensions
          key: mpfb-2.0.16

      - name: Download MPFB zip
        run: |
          if [ ! -d "$HOME/.config/blender/4.5/extensions/user_default/mpfb" ]; then
            curl -sL -o /tmp/mpfb.zip "https://extensions.blender.org/download/sha256:b5cdc8b08147e0c6463e4faa01147491b13a0b062f73415363f029debd11c934/add-on-mpfb-v2.0.16.zip?repository=%2Fapi%2Fv1%2Fextensions%2F&blender_version_min=4.2.0"
          fi

      - name: Render exercises to GLB + thumbnails
        run: |
          mkdir -p site/assets
          for spec in exercises/*.json; do
            echo "=== $spec"
            "$HOME/blender/blender" -b -noaudio --python-exit-code 1 -P pipeline/build_exercise.py -- "$spec" site/assets
          done
          ls -la site/assets
          for spec in exercises/*.json; do
            id=$(python3 -c "import json,sys; print(json.load(open(sys.argv[1]))['id'])" "$spec")
            test -s "site/assets/$id.glb" || { echo "missing $id.glb"; exit 1; }
            test -s "site/assets/$id.png" || { echo "missing $id.png"; exit 1; }
          done

      - name: Assemble watch GIFs + MP4s
        run: |
          for dir in site/assets/frames_*; do
            id=$(basename "$dir" | sed 's/^frames_//')
            ffmpeg -v error -framerate 15 -pattern_type glob -i "$dir/*.png" \
              -vf "split[a][b];[a]palettegen=max_colors=128[p];[b][p]paletteuse=dither=bayer" \
              "site/assets/$id.gif"
            ffmpeg -v error -framerate 15 -pattern_type glob -i "$dir/*.png" \
              -c:v libx264 -pix_fmt yuv420p -movflags +faststart "site/assets/$id.mp4"
            rm -rf "$dir"
            test -s "site/assets/$id.gif" || { echo "missing $id.gif"; exit 1; }
          done
          ls -la site/assets

      - name: Assemble site
        run: |
          cp -r website/* site/
          python3 pipeline/make_manifest.py exercises site/exercises.json

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: render
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
